name: iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test (iPhone simulator)
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show Xcode and simulator inventory
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Ensure an iOS simulator runtime is installed
        run: |
          if ! xcrun simctl list runtimes | grep -q "^iOS"; then
            sudo xcodebuild -downloadPlatform iOS
          fi

      - name: Validate share-extension wiring
        run: python3 tools/validate_share_extension.py

      - name: Build and test
        run: |
          set -o pipefail
          if command -v xcbeautify >/dev/null 2>&1; then
            FORMATTER=(xcbeautify --renderer github-actions)
          else
            FORMATTER=(cat)
          fi
          xcodebuild test \
            -project Recipes/Recipes.xcodeproj \
            -scheme Recipes \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log | "${FORMATTER[@]}"

      # xcodebuild exits 0 even when zero tests are discovered (e.g. the
      # scheme's test action loses the test target), so demand log evidence.
      # Xcode 26 parallel testing prints per-test "Test case '...' passed on
      # 'Clone ...'" lines and no "Executed N tests" summary; older toolchains
      # and swift-testing print the summary forms. Accept either.
      - name: Verify tests actually ran
        run: |
          if ! grep -Eq "^Test case '.+' (passed|failed)" xcodebuild.log \
            && ! grep -Eq '(Executed|Test run with) [1-9][0-9]* tests?' xcodebuild.log; then
            echo '::error::xcodebuild was green but the log has no evidence that any test ran.'
            exit 1
          fi

      - name: Upload logs and results on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            xcodebuild.log
          if-no-files-found: ignore
          retention-days: 14
